<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Analizador de Gráficos - Operaciones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }

        .container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(94, 234, 212, 0.2);
            border-radius: clamp(12px, 4vw, 16px);
            padding: clamp(1.5rem, 5vw, 2.5rem);
            width: 100%;
            max-width: min(700px, 95%);
            box-shadow: 0 0 30px rgba(45, 212, 191, 0.15);
        }

        .title-section {
            text-align: center;
            margin-bottom: clamp(1.5rem, 4vw, 2rem);
        }

        .title-section h1 {
            color: #2dd4bf;
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            text-shadow: 0 0 10px rgba(45, 212, 191, 0.5);
            line-height: 1.3;
        }

        .input-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 250px), 1fr));
            gap: clamp(1rem, 3vw, 1.5rem);
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        label {
            color: #94a3b8;
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input, select {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(94, 234, 212, 0.3);
            border-radius: 8px;
            padding: clamp(0.7rem, 2.5vw, 0.8rem);
            color: #e2e8f0;
            font-size: clamp(0.9rem, 3vw, 1rem);
            outline: none;
            transition: border-color 0.3s ease;
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
        }

        /* Estilo para selects en móviles */
        select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%232dd4bf' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 0.8rem center;
            background-size: 1rem;
            padding-right: 2.5rem;
        }

        input:focus, select:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 8px rgba(45, 212, 191, 0.3);
        }

        .calculate-btn {
            grid-column: 1 / -1;
            background: linear-gradient(90deg, #2dd4bf, #0ea5e9);
            border: none;
            border-radius: 8px;
            padding: clamp(0.8rem, 3vw, 1rem);
            color: #0f172a;
            font-weight: 600;
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            letter-spacing: 0.5px;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.4);
        }

        .calculate-btn:active {
            transform: translateY(0);
        }

        .result-section {
            margin-top: 2rem;
            border-top: 1px solid rgba(94, 234, 212, 0.2);
            padding-top: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 200px), 1fr));
            gap: 1rem;
        }

        .result-card {
            background: rgba(15, 23, 42, 0.7);
            border-radius: 12px;
            padding: clamp(1rem, 3vw, 1.5rem);
            border-left: 4px solid #2dd4bf;
            transition: transform 0.2s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .result-card:hover {
            transform: translateX(5px);
        }

        .result-card h3 {
            color: #2dd4bf;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            margin-bottom: 0.8rem;
            word-break: break-word;
        }

        .result-value {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            font-weight: 600;
            color: #e2e8f0;
            text-shadow: 0 0 8px rgba(226, 232, 240, 0.3);
            word-break: break-word;
            line-height: 1.3;
        }

        .chart-placeholder {
            margin-top: 2rem;
            width: 100%;
            height: clamp(200px, 50vw, 300px);
            background: rgba(15, 23, 42, 0.7);
            border-radius: 12px;
            border: 1px solid rgba(94, 234, 212, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            text-align: center;
            padding: clamp(1rem, 3vw, 1.5rem);
        }

        .chart-placeholder p {
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            max-width: 90%;
        }

        .chart-placeholder .small {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            margin-top: 0.5rem;
            opacity: 0.8;
        }

        .futuristic-glow {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 10px rgba(45, 212, 191, 0.2);
            }
            to {
                box-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
            }
        }

        /* Media queries específicas para mejor control */
        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
            }
            
            .container {
                padding: 1rem;
            }
            
            .result-card {
                border-left-width: 3px;
            }
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            .container {
                max-width: 90%;
            }
            
            .input-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Para tablets en orientación horizontal */
        @media (min-width: 1024px) and (max-width: 1366px) {
            .container {
                max-width: 900px;
            }
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 320px) {
            .title-section h1 {
                font-size: 1.1rem;
            }
            
            input, select, .calculate-btn {
                font-size: 0.8rem;
            }
            
            .result-value {
                font-size: 1rem;
            }
        }

        /* Mejora de accesibilidad táctil en móviles */
        @media (max-width: 768px) {
            input, select, .calculate-btn {
                min-height: 44px;
            }
            
            .calculate-btn {
                margin-top: 0.5rem;
            }
            
            .result-section {
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container futuristic-glow">
        <div class="title-section">
            <h1>Analizador de Operaciones<br>Puntos Máximo/Mínimo</h1>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label for="puntoMaximo">Punto Máximo</label>
                <input type="number" id="puntoMaximo" step="any" placeholder="Valor máximo" inputmode="decimal">
            </div>
            <div class="input-group">
                <label for="puntoMinimo">Punto Mínimo</label>
                <input type="number" id="puntoMinimo" step="any" placeholder="Valor mínimo" inputmode="decimal">
            </div>
            <div class="input-group">
                <label for="tipoOperacion">Tipo de Operación</label>
                <select id="tipoOperacion">
                    <option value="venta">Venta</option>
                    <option value="compra">Compra</option>
                </select>
            </div>
            <div class="input-group">
                <label for="divisor">Divisor (ej: 2, 2.6)</label>
                <input type="number" id="divisor" step="any" value="2.6" placeholder="Ingresa el divisor" inputmode="decimal">
            </div>
            <button class="calculate-btn" onclick="calcularOperacion()">CALCULAR RESULTADO</button>
        </div>

        <div class="result-section">
            <div class="result-card" id="resultadoDiferencia" style="display: none;">
                <h3>Diferencia (Max - Min)</h3>
                <p class="result-value" id="valorDiferencia">-</p>
            </div>
            <div class="result-card" id="resultadoDividido" style="display: none;">
                <h3>Resultado Dividido</h3>
                <p class="result-value" id="valorDividido">-</p>
            </div>
            <div class="result-card" id="resultadoOperacion" style="display: none;">
                <h3>Punto de Operación</h3>
                <p class="result-value" id="valorOperacion">-</p>
            </div>
        </div>

        <div class="chart-placeholder">
            <p>Visualización Gráfica</p>
            <p class="small">(Puntos máximo, mínimo y operación)</p>
        </div>
    </div>

    <script>
        function calcularOperacion() {
            // Obtener valores de entrada
            const puntoMax = parseFloat(document.getElementById('puntoMaximo').value);
            const puntoMin = parseFloat(document.getElementById('puntoMinimo').value);
            const tipoOp = document.getElementById('tipoOperacion').value;
            const divisor = parseFloat(document.getElementById('divisor').value);

            // Validar datos
            if (isNaN(puntoMax) || isNaN(puntoMin) || isNaN(divisor) || divisor === 0) {
                alert("Por favor ingresa valores numéricos válidos (el divisor no puede ser 0)");
                return;
            }

            // Calcular diferencias
            const diferencia = puntoMax - puntoMin;
            const resultadoDividido = diferencia / divisor;
            let puntoOperacion;

            // Definir punto de operación según tipo
            if (tipoOp === 'venta') {
                puntoOperacion = puntoMin - resultadoDividido;
            } else {
                puntoOperacion = puntoMax + resultadoDividido;
            }

            // Mostrar resultados con formato según el tamaño del número
            const formatNumber = (num) => {
                return num.toFixed(4).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            };

            document.getElementById('valorDiferencia').textContent = formatNumber(diferencia);
            document.getElementById('valorDividido').textContent = formatNumber(resultadoDividido);
            document.getElementById('valorOperacion').textContent = formatNumber(puntoOperacion);
            
            // Mostrar cards con animación suave
            const cards = ['resultadoDiferencia', 'resultadoDividido', 'resultadoOperacion'];
            cards.forEach(cardId => {
                const card = document.getElementById(cardId);
                card.style.display = 'flex';
                card.style.animation = 'fadeIn 0.5s ease';
            });
        }

        // Agregar animación de fade in
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
